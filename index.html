<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人展示空间</title>
    <link rel="stylesheet" href="./assets/css/common.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-brand">
            <a href="./index.html">LuoDaoBin</a>
        </div>
        <button class="nav-toggle" id="navToggle" aria-label="切换导航">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="nav-links" id="navLinks">
            <!-- 主题导航将由 JS 动态渲染 -->
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1 class="hero-title">构建你的数字空间</h1>
            <p class="hero-subtitle">每一个主题，都是一段独特的表达</p>
            <div class="hero-actions">
                <a href="#themes" class="btn btn-primary">浏览主题</a>
            </div>
        </div>
        <div class="hero-visual">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </header>

    <main>
        <section class="themes-section" id="themes">
            <div class="container">
                <h2 class="section-title">我的主题</h2>
                <p class="section-desc">按创建时间排序</p>
                <div class="themes-grid" id="themesGrid">
                    <!-- 主题卡片由 JS 动态渲染 -->
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>静态个人展示网站</p>
        </div>
    </footer>

    <script src="./assets/js/nav.js"></script>
</body>
</html>
